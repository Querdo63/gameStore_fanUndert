<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNDERSTORE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="user-block" id="user-block">
                <span class="icon">❤</span>
                <span class="username" id="username-display">Войти</span>
            </div>

            <div class="search-block">
                <label for="search-input">ПОИСК</label>
                <input type="text" id="search-input" placeholder="название игры...">
            </div>

            <div class="cart-block" id="cart-block">
                <span class="icon">⊞</span>
                <span>Корзина</span>
                <span class="cart-count" id="cart-count">0</span>
            </div>
        </aside>

        <main class="main">
            <h1 class="store-title">UNDERSTORE</h1>
            <div class="games-grid" id="games-grid">
                </div>
        </main>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div id="modal-details" class="modal-details"></div>
        </div>
    </div>

    <div class="modal-overlay" id="cart-modal">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <h2 style="color: #f00; margin-bottom: 20px;">КОРЗИНА</h2>
            <div id="cart-items-container"></div>
            <div class="cart-total" id="cart-total">ИТОГО: 0 ₽</div>
            <button class="checkout-btn" id="checkout-btn">ОФОРМИТЬ ЗАКАЗ</button>
        </div>
    </div>

    <div class="modal-overlay" id="auth-modal">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Вход</button>
                <button class="auth-tab" data-tab="reg">Регистрация</button>
            </div>
            <div id="login-form" class="auth-form">
                <input type="text" id="login-username" class="auth-input" placeholder="ИМЯ">
                <input type="password" id="login-password" class="auth-input" placeholder="ПАРОЛЬ">
                <button id="login-submit" class="auth-submit">ВОЙТИ</button>
            </div>
            <div id="register-form" class="auth-form hidden">
                <input type="text" id="reg-username" class="auth-input" placeholder="НОВОЕ ИМЯ">
                <input type="password" id="reg-password" class="auth-input" placeholder="НОВЫЙ ПАРОЛЬ">
                <button id="register-submit" class="auth-submit">СОЗДАТЬ</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
